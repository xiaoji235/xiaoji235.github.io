  <p>首先，打开上述网站，找到您喜欢的壁纸，并点进去</p>
  <p>接着，您会看到界面有壁纸预览、上传者、以及分辨率选择</p>
  <p>我们在那张图片上右键，在edge上右键菜单上会有一栏"<strong>复制图像链接</strong>"，然后点击它</p>
  <p>最后在主页上应用它就OK啦，不必担心图片模糊，因为预览的图片基本上是很清晰的</p>
  <p>最后祝大家元旦快乐！🎉</p>
